<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marker Test</title>
  <style>
    * { margin:0; padding:0; }
    body { background:#000; overflow:hidden; font-family:sans-serif; }
    canvas { display:block; }
    #ui {
      position:fixed; bottom:20px; left:0; right:0;
      text-align:center; z-index:10;
    }
    #status {
      display:inline-block; padding:8px 20px; border-radius:20px;
      background:rgba(0,0,0,0.7); color:#ffbb00; font-size:1rem;
      border:1px solid rgba(255,187,0,0.4);
    }
    #status.found { color:#00ffaa; border-color:rgba(0,255,170,0.4); }
    button {
      display:block; margin:10px auto 0;
      padding:14px 30px; font-size:1rem; font-weight:bold;
      background:#ff4d00; color:#fff; border:none; border-radius:10px; cursor:pointer;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="status">Bereit</div>
    <button onclick="startCamera()">Kamera starten</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

  <script>
    var c      = document.getElementById('c');
    var ctx    = c.getContext('2d');
    var status = document.getElementById('status');

    c.width  = window.innerWidth;
    c.height = window.innerHeight;

    // Exakt wie der funktionierende Test
    async function startCamera() {
      try {
        status.textContent = 'Kamera wird verbunden...';
        var stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });

        var video = document.createElement('video');
        video.srcObject   = stream;
        video.autoplay    = true;
        video.playsInline = true;
        video.muted       = true;
        document.body.appendChild(video);

        status.textContent = 'Kamera aktiv!';
        status.style.color = '#00ffaa';
        document.querySelector('button').style.display = 'none';

        // Intervall wie im funktionierenden Test
        setInterval(function() {
          // Video auf Canvas
          ctx.drawImage(video, 0, 0, c.width, c.height);

          // QR-Code suchen
          var imageData = ctx.getImageData(0, 0, c.width, c.height);
          var code = jsQR(imageData.data, imageData.width, imageData.height);

          if(code) {
            var loc = code.location;
            ctx.beginPath();
            ctx.moveTo(loc.topLeftCorner.x,     loc.topLeftCorner.y);
            ctx.lineTo(loc.topRightCorner.x,    loc.topRightCorner.y);
            ctx.lineTo(loc.bottomRightCorner.x, loc.bottomRightCorner.y);
            ctx.lineTo(loc.bottomLeftCorner.x,  loc.bottomLeftCorner.y);
            ctx.closePath();
            ctx.strokeStyle = '#00ffaa';
            ctx.lineWidth   = 6;
            ctx.stroke();

            ctx.font      = 'bold 28px sans-serif';
            ctx.fillStyle = '#00ffaa';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#000';
            ctx.shadowBlur  = 8;
            ctx.fillText('ERKANNT!', 
              (loc.topLeftCorner.x + loc.topRightCorner.x) / 2,
              loc.topLeftCorner.y - 12);
            ctx.shadowBlur = 0;

            status.textContent = 'QR-Code erkannt!';
            status.className   = 'found';
          } else {
            status.textContent = 'QR-Code vor Kamera halten...';
            status.className   = '';
          }
        }, 100);

      } catch(err) {
        status.textContent = 'Fehler: ' + err.name;
        status.style.color = '#ff0000';
      }
    }
  </script>
</body>
</html>

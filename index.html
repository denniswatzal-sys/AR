<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marker Test</title>
  <style>
    * { margin:0; padding:0; }
    body { background:#000; overflow:hidden; font-family:sans-serif; }
    canvas { display:block; }
    #ui {
      position:fixed; bottom:20px; left:0; right:0;
      text-align:center; z-index:10;
    }
    #status {
      display:inline-block;
      padding:8px 20px; border-radius:20px;
      background:rgba(0,0,0,0.7);
      color:#ffbb00; font-size:1rem;
      border:1px solid rgba(255,187,0,0.4);
    }
    #status.found { color:#00ffaa; border-color:rgba(0,255,170,0.4); }
    button {
      display:block; margin:10px auto 0;
      padding:14px 30px; font-size:1rem; font-weight:bold;
      background:#ff4d00; color:#fff; border:none; border-radius:10px; cursor:pointer;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="status">Kamera starten</div>
    <button onclick="start()">Starten</button>
  </div>

  <!-- jsQR: einzelne JS-Datei fuer QR-Code Erkennung -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

  <script>
    var c      = document.getElementById('c');
    var ctx    = c.getContext('2d');
    var status = document.getElementById('status');
    var video, scanning = false;

    c.width  = window.innerWidth;
    c.height = window.innerHeight;

    window.addEventListener('resize', function() {
      c.width  = window.innerWidth;
      c.height = window.innerHeight;
    });

    async function start() {
      document.querySelector('button').style.display = 'none';
      status.textContent = 'Kamera wird gestartet...';

      try {
        var stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode:'environment' }
        });
        video = document.createElement('video');
        video.srcObject   = stream;
        video.autoplay    = true;
        video.playsInline = true;
        video.muted       = true;
        video.style.display = 'none';
        document.body.appendChild(video);

        video.onplay = function() {
          status.textContent = 'QR-Code vor die Kamera halten...';
          scanning = true;
          scan();
        };
      } catch(err) {
        status.textContent = 'Fehler: ' + err.name;
      }
    }

    function scan() {
      if(!scanning) return;

      // Video auf Canvas zeichnen
      c.width  = window.innerWidth;
      c.height = window.innerHeight;
      ctx.drawImage(video, 0, 0, c.width, c.height);

      // QR-Code im Bild suchen
      var imageData = ctx.getImageData(0, 0, c.width, c.height);
      var code = jsQR(imageData.data, imageData.width, imageData.height);

      if(code) {
        // QR-Code gefunden! Rahmen zeichnen
        var loc = code.location;
        ctx.beginPath();
        ctx.moveTo(loc.topLeftCorner.x,     loc.topLeftCorner.y);
        ctx.lineTo(loc.topRightCorner.x,    loc.topRightCorner.y);
        ctx.lineTo(loc.bottomRightCorner.x, loc.bottomRightCorner.y);
        ctx.lineTo(loc.bottomLeftCorner.x,  loc.bottomLeftCorner.y);
        ctx.closePath();
        ctx.strokeStyle = '#00ffaa';
        ctx.lineWidth   = 4;
        ctx.stroke();

        // Text darueber
        var cx = (loc.topLeftCorner.x + loc.topRightCorner.x) / 2;
        var cy = loc.topLeftCorner.y - 16;
        ctx.font      = 'bold 24px sans-serif';
        ctx.fillStyle = '#00ffaa';
        ctx.textAlign = 'center';
        ctx.shadowColor = '#000';
        ctx.shadowBlur  = 6;
        ctx.fillText('ERKANNT: ' + code.data.substring(0,20), cx, cy);
        ctx.shadowBlur = 0;

        status.textContent = 'QR-Code erkannt!';
        status.className   = 'found';
      } else {
        status.textContent = 'Suche QR-Code...';
        status.className   = '';
      }

      setTimeout(scan, 100);
    }
  </script>
</body>
</html>

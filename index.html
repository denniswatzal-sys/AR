<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Test</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
  <!-- A-Frame + AR.js -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
</head>
<body>
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false"
  >

    <!-- Marker: Hiro ist der Standard-Testmarker von AR.js -->
    <a-marker preset="hiro">
      <!-- Roter Wuerfel ueber dem Marker -->
      <a-box position="0 0.5 0" color="#ff4d00" scale="1 1 1"></a-box>
    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>
</body>
</html>

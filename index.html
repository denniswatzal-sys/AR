<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marker Test</title>
  <style>
    * { margin:0; padding:0; }
    body { background:#000; overflow:hidden; font-family:sans-serif; }

    /* Video sichtbar aber hinter Canvas */
    #video {
      position:fixed; top:0; left:0;
      width:100vw; height:100vh;
      object-fit:cover;
      z-index:1;
    }

    /* Canvas darueber */
    #c {
      position:fixed; top:0; left:0;
      width:100vw; height:100vh;
      z-index:2;
    }

    #ui {
      position:fixed; bottom:20px; left:0; right:0;
      text-align:center; z-index:10;
    }
    #status {
      display:inline-block; padding:8px 20px; border-radius:20px;
      background:rgba(0,0,0,0.7); color:#ffbb00; font-size:1rem;
      border:1px solid rgba(255,187,0,0.4);
    }
    #status.found { color:#00ffaa; border-color:rgba(0,255,170,0.4); }
    button {
      display:block; margin:10px auto 0;
      padding:14px 30px; font-size:1rem; font-weight:bold;
      background:#ff4d00; color:#fff; border:none; border-radius:10px; cursor:pointer;
    }
  </style>
</head>
<body>
  <!-- Video sichtbar im Hintergrund -->
  <video id="video" autoplay playsinline muted></video>

  <!-- Canvas transparent darueber fuer Overlay -->
  <canvas id="c"></canvas>

  <div id="ui">
    <div id="status">Bereit</div>
    <button onclick="startCamera()">Kamera starten</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

  <script>
    var video  = document.getElementById('video');
    var c      = document.getElementById('c');
    var ctx    = c.getContext('2d');
    var status = document.getElementById('status');

    c.width  = window.innerWidth;
    c.height = window.innerHeight;

    async function startCamera() {
      try {
        status.textContent = 'Kamera wird verbunden...';
        var stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        video.srcObject = stream;

        status.textContent = 'QR-Code vor Kamera halten...';
        document.querySelector('button').style.display = 'none';

        // Nur Overlay auf Canvas zeichnen - kein drawImage noetig!
        setInterval(function() {
          c.width  = window.innerWidth;
          c.height = window.innerHeight;

          // Canvas leeren (transparent - Video scheint durch)
          ctx.clearRect(0, 0, c.width, c.height);

          // Fuer QR-Erkennung brauchen wir Pixeldaten
          // Kleinen Hilfs-Canvas im Hintergrund nutzen
          var tmp = document.createElement('canvas');
          tmp.width  = 640;
          tmp.height = 480;
          var tctx = tmp.getContext('2d');
          tctx.drawImage(video, 0, 0, 640, 480);

          var imageData = tctx.getImageData(0, 0, 640, 480);
          var code = jsQR(imageData.data, 640, 480);

          if(code) {
            // Koordinaten auf Bildschirmgroesse skalieren
            var sx = c.width  / 640;
            var sy = c.height / 480;

            var loc = code.location;
            ctx.beginPath();
            ctx.moveTo(loc.topLeftCorner.x*sx,     loc.topLeftCorner.y*sy);
            ctx.lineTo(loc.topRightCorner.x*sx,    loc.topRightCorner.y*sy);
            ctx.lineTo(loc.bottomRightCorner.x*sx, loc.bottomRightCorner.y*sy);
            ctx.lineTo(loc.bottomLeftCorner.x*sx,  loc.bottomLeftCorner.y*sy);
            ctx.closePath();
            ctx.strokeStyle = '#00ffaa';
            ctx.lineWidth   = 6;
            ctx.stroke();

            var cx = (loc.topLeftCorner.x + loc.topRightCorner.x) / 2 * sx;
            var cy = loc.topLeftCorner.y * sy - 16;
            ctx.font        = 'bold 32px sans-serif';
            ctx.fillStyle   = '#00ffaa';
            ctx.textAlign   = 'center';
            ctx.shadowColor = '#000';
            ctx.shadowBlur  = 8;
            ctx.fillText('ERKANNT!', cx, cy);
            ctx.shadowBlur  = 0;

            status.textContent = 'QR-Code erkannt!';
            status.className   = 'found';
          } else {
            status.textContent = 'QR-Code vor Kamera halten...';
            status.className   = '';
          }
        }, 150);

      } catch(err) {
        status.textContent = 'Fehler: ' + err.name;
        status.style.color = '#ff0000';
      }
    }
  </script>
</body>
</html>

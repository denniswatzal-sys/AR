<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Dart AR Trainer</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

  <!-- A-FRAME: autoStart=true, startet sofort beim Laden -->
  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: ./targets.mind;"
    color-space="sRGB"
    renderer="colorManagement: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="ar-anchor">

      <a-ring id="ring-outer"
        color="#ff4d00" radius-inner="0.38" radius-outer="0.42"
        opacity="0.85" position="0 0 0.001"
        animation="property: opacity; from: 0.3; to: 0.9; dur: 900; dir: alternate; loop: true; easing: easeInOutSine">
      </a-ring>

      <a-ring id="ring-mid"
        color="#ffbb00" radius-inner="0.22" radius-outer="0.25"
        opacity="0.7" position="0 0 0.001"
        animation="property: opacity; from: 0.2; to: 0.8; dur: 700; dir: alternate; loop: true; easing: easeInOutSine; delay: 200">
      </a-ring>

      <a-circle id="ar-bull"
        color="#ff4d00" radius="0.07" opacity="0.9" position="0 0 0.001"
        animation="property: scale; from: 0.8 0.8 0.8; to: 1.1 1.1 1.1; dur: 800; dir: alternate; loop: true">
      </a-circle>

      <a-text id="ar-target-text"
        value="T20" color="#ffffff" align="center" width="1.2"
        position="0 0.58 0.01"
        animation="property: scale; from: 0.9 0.9 0.9; to: 1.05 1.05 1.05; dur: 1000; dir: alternate; loop: true">
      </a-text>

      <a-entity id="sector-highlight">
        <a-entity
          geometry="primitive: cone; radiusBottom: 0.39; radiusTop: 0.01; height: 0.01; thetaStart: -9; thetaLength: 18; openEnded: true"
          material="color: #ff4d00; opacity: 0.35; side: double"
          rotation="-90 0 0" position="0 0.195 0">
        </a-entity>
      </a-entity>

    </a-entity>
  </a-scene>

  <!-- HAUPT-UI oben drauf -->
  <div id="header">
    <h1>DART AR</h1>
    <div id="status" class="searching">Scheibe suchen...</div>
  </div>

  <div id="controls">
    <div id="score-row">
      <div class="score-item">
        <div class="score-val" id="score-hits">0</div>
        <div class="score-lbl">Treffer</div>
      </div>
      <div class="score-item">
        <div class="score-val" id="score-streak">0</div>
        <div class="score-lbl">Streak</div>
      </div>
      <div class="score-item">
        <div class="score-val" id="score-total">0</div>
        <div class="score-lbl">Gesamt</div>
      </div>
    </div>

    <div id="target-display">
      <div id="target-label">Naechstes Ziel</div>
      <div id="target-field">T20</div>
    </div>

    <div id="btn-row">
      <button class="btn btn-secondary" id="btn-mode" onclick="App.toggleMode()">Modus: Zufaellig</button>
      <button class="btn btn-primary" onclick="App.nextTarget()">Weiter</button>
    </div>

    <button class="btn btn-hit" onclick="App.registerHit()">Treffer!</button>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(function(){});
    }
  </script>
</body>
</html>

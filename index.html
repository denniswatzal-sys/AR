<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Canvas Test</title>
  <style>
    * { margin:0; padding:0; }
    body { background:#000; overflow:hidden; }
    canvas { display:block; }
    #ui {
      position:fixed; bottom:20px; left:0; right:0;
      text-align:center; font-family:sans-serif;
      z-index:10;
    }
    #status { color:#ffbb00; font-size:1rem; margin-bottom:10px; }
    button { padding:14px 30px; font-size:1rem; font-weight:bold; background:#ff4d00; color:#fff; border:none; border-radius:10px; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="status">Canvas laeuft...</div>
    <button onclick="startCamera()">Kamera dazu</button>
  </div>

  <script>
    var c   = document.getElementById('c');
    var ctx = c.getContext('2d');

    c.width  = window.innerWidth;
    c.height = window.innerHeight;

    // Sofort etwas zeichnen - OHNE Kamera
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, c.width, c.height);

    ctx.beginPath();
    ctx.arc(c.width/2, c.height/2, 100, 0, Math.PI*2);
    ctx.strokeStyle = '#ff4d00';
    ctx.lineWidth = 8;
    ctx.stroke();

    ctx.font = 'bold 40px sans-serif';
    ctx.fillStyle = '#ff4d00';
    ctx.textAlign = 'center';
    ctx.fillText('T20', c.width/2, c.height/2 + 15);

    document.getElementById('status').textContent = 'Siehst du den Kreis?';

    async function startCamera() {
      try {
        var stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' } });
        // Video als Canvas-Hintergrund zeichnen
        var video = document.createElement('video');
        video.srcObject = stream;
        video.autoplay = true;
        video.playsInline = true;
        video.muted = true;
        video.onplay = function() {
          document.getElementById('status').textContent = 'Kamera + Overlay aktiv!';
          document.getElementById('status').style.color = '#00ffaa';
          document.querySelector('button').style.display = 'none';

          var pulse = 0;
          setInterval(function() {
            // Video auf Canvas zeichnen
            ctx.drawImage(video, 0, 0, c.width, c.height);

            // Overlay drueber
            var cx = c.width/2, cy = c.height/2;
            var r = 100 + Math.sin(pulse) * 15;

            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI*2);
            ctx.strokeStyle = '#ff4d00';
            ctx.lineWidth = 6;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(cx, cy, r*0.55, 0, Math.PI*2);
            ctx.strokeStyle = '#ffbb00';
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.font = 'bold 36px sans-serif';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.fillText('T20', cx, cy - r - 10);

            pulse += 0.08;
          }, 33);
        };
        document.body.appendChild(video);
      } catch(err) {
        document.getElementById('status').textContent = 'Fehler: ' + err.name;
        document.getElementById('status').style.color = '#ff0000';
      }
    }
  </script>
</body>
</html>

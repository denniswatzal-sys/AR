<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blauer Ring Test</title>
  <style>
    * { margin:0; padding:0; }
    body { background:#111; color:#fff; font-family:sans-serif; text-align:center; padding:20px; }
    h2 { color:#ff4d00; margin-bottom:10px; }
    canvas { max-width:100%; border:2px solid #333; display:block; margin:10px auto; }
    #status { padding:10px; background:#222; border-radius:8px; margin:10px 0; font-size:0.9rem; color:#ffbb00; }
    #status.found { color:#00ffaa; }
  </style>
</head>
<body>
  <h2>Blauer Ring Erkennung</h2>
  <div id="status">Bild wird geladen...</div>
  <canvas id="c"></canvas>

  <script>
    var canvas = document.getElementById('c');
    var ctx    = canvas.getContext('2d');
    var status = document.getElementById('status');

    var img = new Image();
    img.onload = function() {
      canvas.width  = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      status.textContent = 'Bild geladen - suche blauen Ring...';
      detectBlueRing();
    };
    img.onerror = function() {
      status.textContent = 'Fehler: Board.png nicht gefunden!';
      status.style.color = '#ff0000';
    };
    img.src = 'Board.png';

    function detectBlueRing() {
      var w = canvas.width, h = canvas.height;
      var imageData = ctx.getImageData(0, 0, w, h);
      var data = imageData.data;

      // Alle blauen Pixel finden
      var bluePixels = [];
      for(var i = 0; i < data.length; i += 4) {
        var r = data[i], g = data[i+1], b = data[i+2];
        // Blau: B deutlich hoeher als R und G
        if(b > 100 && b > r * 1.5 && b > g * 1.5) {
          var idx = i / 4;
          var x = idx % w;
          var y = Math.floor(idx / w);
          bluePixels.push({ x:x, y:y });
        }
      }

      status.textContent = 'Blaue Pixel gefunden: ' + bluePixels.length;

      if(bluePixels.length < 100) {
        status.textContent = 'Zu wenige blaue Pixel (' + bluePixels.length + ') - Farberkennung anpassen?';
        status.style.color = '#ff4d00';
        return;
      }

      // Mittelpunkt und Radius berechnen
      var sumX = 0, sumY = 0;
      bluePixels.forEach(function(p) { sumX += p.x; sumY += p.y; });
      var cx = sumX / bluePixels.length;
      var cy = sumY / bluePixels.length;

      // Durchschnittlicher Radius
      var sumR = 0;
      bluePixels.forEach(function(p) {
        var dx = p.x - cx, dy = p.y - cy;
        sumR += Math.sqrt(dx*dx + dy*dy);
      });
      var radius = sumR / bluePixels.length;

      // Ergebnis anzeigen
      status.textContent = 'Ring erkannt! Mitte: (' + Math.round(cx) + ',' + Math.round(cy) + ') Radius: ' + Math.round(radius) + 'px';
      status.className = 'found';

      // Erkannten Ring einzeichnen
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI*2);
      ctx.strokeStyle = '#00ffaa';
      ctx.lineWidth = 4;
      ctx.stroke();

      // Mittelpunkt markieren
      ctx.beginPath();
      ctx.arc(cx, cy, 8, 0, Math.PI*2);
      ctx.fillStyle = '#ff4d00';
      ctx.fill();

      // Bull-Eye beschriften
      ctx.font = 'bold 20px sans-serif';
      ctx.fillStyle = '#ff4d00';
      ctx.textAlign = 'center';
      ctx.fillText('BULL', cx, cy - 14);
    }
  </script>
</body>
</html>

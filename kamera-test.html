<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kamera Test</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:sans-serif; text-align:center; }
    video { width:100vw; height:60vh; object-fit:cover; display:block; }
    #msg { padding:20px; font-size:1.1rem; }
    button { margin:10px; padding:15px 30px; font-size:1rem; background:#ff4d00; color:#fff; border:none; border-radius:10px; cursor:pointer; }
  </style>
</head>
<body>
  <div id="msg">Tippe auf den Button um die Kamera zu testen</div>
  <video id="video" autoplay playsinline></video>
  <br>
  <button onclick="startCamera()">Kamera starten</button>

  <script>
    async function startCamera() {
      var msg = document.getElementById('msg');
      try {
        msg.textContent = 'Kamera wird gestartet...';
        var stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        document.getElementById('video').srcObject = stream;
        msg.textContent = 'Kamera funktioniert!';
        msg.style.color = '#00ffaa';
      } catch(err) {
        msg.textContent = 'FEHLER: ' + err.name + ' - ' + err.message;
        msg.style.color = '#ff4d00';
        console.error(err);
      }
    }
  </script>
</body>
</html>
